spring:
  application:
    name: truedom
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5499/truedom?stringtype=unspecified}
    username: ${POSTGRES_USER:truedom}
    password: ${POSTGRES_PASSWORD:truedom_local}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: ${PORT:8080}

spring.servlet.multipart:
  max-file-size: 50MB
  max-request-size: 50MB
