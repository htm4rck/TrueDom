spring:
  datasource:
    url: jdbc:h2:mem:truedom-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

server:
  port: 0
