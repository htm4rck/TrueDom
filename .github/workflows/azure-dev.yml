name: Deploy DEV to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  API_IMAGE_NAME: truedom-api

jobs:
  deploy-backend:
    name: Backend - Build, Migrate & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: mvn -B package -DskipTests

      - name: Run Flyway migrations
        working-directory: backend
        if: vars.SKIP_MIGRATIONS != 'true'
        run: |
          mvn flyway:migrate \
            -Dflyway.url="${{ secrets.POSTGRES_URL }}" \
            -Dflyway.user="${{ secrets.POSTGRES_USER }}" \
            -Dflyway.password="${{ secrets.POSTGRES_PASSWORD }}" \
            -Dflyway.locations="filesystem:../database/migrations"

      - name: Login to ACR
        run: az acr login --name "${{ secrets.AZURE_ACR_NAME }}"

      - name: Build and push Docker image
        working-directory: backend
        run: |
          ACR_LOGIN_SERVER=$(az acr show --name "${{ secrets.AZURE_ACR_NAME }}" --query loginServer -o tsv)
          docker build -t "$ACR_LOGIN_SERVER/$API_IMAGE_NAME:${{ github.sha }}" .
          docker push "$ACR_LOGIN_SERVER/$API_IMAGE_NAME:${{ github.sha }}"

      - name: Update Container App
        run: |
          ACR_LOGIN_SERVER=$(az acr show --name "${{ secrets.AZURE_ACR_NAME }}" --query loginServer -o tsv)
          az containerapp update \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$ACR_LOGIN_SERVER/$API_IMAGE_NAME:${{ github.sha }}"

  deploy-frontend:
    name: Frontend - Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
          # Angular 19+ SSR fix
          if [ -f dist/fuse/browser/index.csr.html ] && [ ! -f dist/fuse/browser/index.html ]; then
            cp dist/fuse/browser/index.csr.html dist/fuse/browser/index.html
          fi

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist/fuse/browser
          skip_app_build: true
