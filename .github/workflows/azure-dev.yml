name: Deploy DEV to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  API_IMAGE_NAME: truedom-api

jobs:
  deploy-backend:
    name: Backend - Azure Container Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push API image with ACR
        run: |
          az acr build \
            --registry "${{ secrets.AZURE_ACR_NAME }}" \
            --image "$API_IMAGE_NAME:${{ github.sha }}" \
            ./backend

      - name: Update Container App
        run: |
          ACR_LOGIN_SERVER=$(az acr show \
            --name "${{ secrets.AZURE_ACR_NAME }}" \
            --query loginServer \
            --output tsv)

          az containerapp update \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$ACR_LOGIN_SERVER/$API_IMAGE_NAME:${{ github.sha }}"

  deploy-frontend:
    name: Frontend - Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist/fuse/browser
          skip_app_build: true
